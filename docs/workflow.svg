<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 900" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="dn" markerWidth="10" markerHeight="10" refX="5" refY="8" orient="auto"><path d="M1,1 L5,8 L9,1" fill="none" stroke="#94a3b8" stroke-width="1.6"/></marker>
    <marker id="gy" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
    <style>
      .title{font-size:20px;font-weight:700;fill:#0f172a}
      .subt{font-size:12px;fill:#64748b}
      .card{fill:#ffffff;stroke:#e2e8f0;stroke-width:1.4}
      .side{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.3}
      .bt{font-size:13px;font-weight:700;fill:#0f172a}
      .li{font-size:10px;fill:#475569}
      .impl{font-size:9px;fill:#0d9488;font-family:ui-monospace,Menlo,Consolas,monospace}
      .iac{font-size:9px;fill:#0d9488;font-family:ui-monospace,Menlo,Consolas,monospace}
      .ref{font-size:9px;fill:#94a3b8;font-family:ui-monospace,Menlo,Consolas,monospace}
      .h{font-size:10px;font-weight:700;fill:#334155}
      .hg{font-size:10px;font-weight:700;fill:#94a3b8}
      .badge-t{font-size:12px;font-weight:700;fill:#ffffff}
      .flow{stroke:#94a3b8;stroke-width:2;fill:none}
      .dash{stroke:#94a3b8;stroke-width:1.4;fill:none;stroke-dasharray:5 4}
      .dashlbl{font-size:9.5px;fill:#94a3b8}
    </style>
  </defs>
  <rect x="0" y="0" width="1240" height="900" fill="#ffffff"/>
  <text x="30" y="34" class="title">Workflow — code path vs production deploy</text>
  <text x="30" y="56" class="subt">teal mono = implemented in repo · grey = reference stub only</text>

  <rect x="30" y="168" width="300" height="330" rx="12" class="side"/>
  <text x="48" y="192" class="bt">How to run it</text>
  <text x="48" y="216" class="h">LOCAL / DEMO</text>
  <text x="48" y="236" class="impl">make demo · make scan · make poc</text>
  <text x="48" y="252" class="impl">make stack (LocalStack SQS + workers)</text>
  <text x="48" y="280" class="h">PRODUCTION</text>
  <text x="48" y="300" class="impl">make deploy-apply (Terraform ECS)</text>
  <text x="48" y="316" class="impl">make set-scanner-secret</text>
  <text x="48" y="340" class="h">IN REPO</text>
  <text x="48" y="360" class="li">src/asset_review/ · infra/terraform/</text>
  <text x="48" y="376" class="li">Dockerfile · docker-compose.yml</text>
  <text x="48" y="392" class="li">85 tests (pytest + moto)</text>
  <text x="48" y="420" class="h">DOCS</text>
  <text x="48" y="440" class="li">docs/PRODUCTION_SETUP.md</text>
  <text x="48" y="456" class="li">docs/THREAT_MODEL.md</text>

  <rect x="380" y="80" width="400" height="56" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.4"/>
  <text x="580" y="104" text-anchor="middle" class="bt">New asset created</text>
  <text x="580" y="122" text-anchor="middle" class="li">CloudTrail event → EventBridge (prod) or replay JSON (demo)</text>
  <line x1="580" y1="136" x2="580" y2="166" class="flow" marker-end="url(#dn)"/>

  <rect x="380" y="168" width="400" height="92" rx="11" class="card"/>
  <rect x="396" y="186" width="26" height="26" rx="7" fill="#2563eb"/><text x="409" y="204" text-anchor="middle" class="badge-t">1</text>
  <text x="434" y="198" class="bt">Asset discovery</text>
  <text x="434" y="220" class="li">CloudTrail parsers → Asset · enqueue to SQS</text>
  <text x="434" y="240" class="impl">discovery/cloudtrail.py · lambda_handler.py</text>
  <text x="434" y="253" class="iac">prod: infra/terraform/eventbridge.tf + lambda.tf</text>
  <line x1="580" y1="260" x2="580" y2="288" class="flow" marker-end="url(#dn)"/>

  <rect x="380" y="290" width="400" height="92" rx="11" class="card"/>
  <rect x="396" y="308" width="26" height="26" rx="7" fill="#0d9488"/><text x="409" y="326" text-anchor="middle" class="badge-t">2</text>
  <text x="434" y="320" class="bt">Metadata collection</text>
  <text x="434" y="342" class="li">DNS · HTTP · TLS · ports · WAF · S3 probe</text>
  <text x="434" y="362" class="impl">enrichment/ · netguard.py (SSRF guard)</text>
  <line x1="580" y1="382" x2="580" y2="410" class="flow" marker-end="url(#dn)"/>

  <rect x="380" y="412" width="400" height="92" rx="11" class="card"/>
  <rect x="396" y="430" width="26" height="26" rx="7" fill="#d97706"/><text x="409" y="448" text-anchor="middle" class="badge-t">3</text>
  <text x="434" y="442" class="bt">Security checks</text>
  <text x="434" y="464" class="li">rule registry · severity + confidence</text>
  <text x="434" y="484" class="impl">checks/rules.py · soft-404 + content validation</text>
  <line x1="580" y1="504" x2="580" y2="532" class="flow" marker-end="url(#dn)"/>

  <rect x="380" y="534" width="400" height="92" rx="11" class="card"/>
  <rect x="396" y="552" width="26" height="26" rx="7" fill="#7c3aed"/><text x="409" y="570" text-anchor="middle" class="badge-t">4</text>
  <text x="434" y="564" class="bt">LLM review</text>
  <text x="434" y="586" class="li">Claude structured JSON · heuristic fallback</text>
  <text x="434" y="606" class="impl">llm/reviewer.py · Secrets Manager in prod</text>
  <line x1="580" y1="626" x2="580" y2="654" class="flow" marker-end="url(#dn)"/>

  <rect x="380" y="656" width="400" height="92" rx="11" class="card"/>
  <rect x="396" y="674" width="26" height="26" rx="7" fill="#16a34a"/><text x="409" y="692" text-anchor="middle" class="badge-t">5</text>
  <text x="434" y="686" class="bt">Findings &amp; report</text>
  <text x="434" y="708" class="li">Slack alerts · S3 JSON/MD · dashboard index.html</text>
  <text x="434" y="728" class="impl">notify/slack.py · storage/s3.py · dashboard-sync λ</text>

  <path d="M780 290 L808 290 L808 626 L780 626" class="dash"/>
  <text x="800" y="458" transform="rotate(-90 800 458)" text-anchor="middle" class="dashlbl">ECS worker loop</text>
  <path d="M808 372 L850 372" class="dash" marker-end="url(#gy)"/>

  <rect x="850" y="168" width="370" height="196" rx="12" class="side"/>
  <text x="868" y="192" class="bt">Production orchestration</text>
  <text x="868" y="212" class="h">DEPLOYED VIA TERRAFORM</text>
  <text x="868" y="230" class="li">EventBridge tier-1 rule → Discovery Lambda</text>
  <text x="868" y="246" class="li">SQS + DLQ → ECS Fargate worker service</text>
  <text x="868" y="262" class="li">S3 reports · dashboard-sync Lambda · Secrets Manager</text>
  <text x="868" y="278" class="iac">infra/terraform/ · make deploy-apply</text>
  <text x="868" y="304" class="hg">REFERENCE ONLY</text>
  <text x="868" y="322" class="li">Step Functions · per-asset K8s Job</text>
  <text x="868" y="340" class="ref">infra/step-functions.asl.json · k8s-scan-job.yaml</text>

  <rect x="850" y="386" width="370" height="232" rx="12" class="side"/>
  <text x="868" y="410" class="bt">Scanner isolation (ECS prod)</text>
  <text x="868" y="430" class="h">CODE</text>
  <text x="868" y="448" class="li">netguard.py — block private/link-local targets</text>
  <text x="868" y="464" class="li">non-root container · read-only rootfs</text>
  <text x="868" y="488" class="h">NETWORK + RUNTIME (Terraform)</text>
  <text x="868" y="506" class="li">dedicated subnet · NACL deny RFC1918 + 169.254/16</text>
  <text x="868" y="522" class="li">no SG ingress · cap-drop · least-privilege task IAM</text>
  <text x="868" y="538" class="iac">infra/terraform/network.tf · ecs.tf</text>
  <text x="868" y="562" class="hg">LOCAL DEMO GAP</text>
  <text x="868" y="580" class="li">make stack — code guards only, no NACL</text>

  <text x="30" y="866" class="subt">Not built: finding dedup/lifecycle · L2 Config reconciliation · L3 CT/DNS · per-team SSO dashboard.</text>
</svg>
